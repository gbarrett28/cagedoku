name: Deploy Cloudflare Worker

on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

# Only one deployment runs at a time; cancel an in-progress run if a new one
# is queued so the latest commit always wins.
concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    # Expose the secret as a job-level env var so the Deploy step can
    # reference it in its `if` condition (step-level env is not accessible
    # in if expressions).
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: Run tests
        working-directory: worker
        run: npm test

      - name: Deploy
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: '3'
