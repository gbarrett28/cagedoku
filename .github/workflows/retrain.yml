name: Retrain digit recogniser

on:
  schedule:
    - cron: '0 3 * * 0'   # 03:00 UTC every Sunday
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install scikit-learn numpy scipy pillow matplotlib boto3

      - name: List pending R2 uploads
        id: list
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python3 scripts/_r2_list.py cagedoku-training training/ > /tmp/r2_keys.txt
          COUNT=$(wc -l < /tmp/r2_keys.txt | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT pending upload(s)."

      - name: Download pending uploads
        if: steps.list.outputs.count != '0'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p /tmp/training
          python3 scripts/_r2_download.py cagedoku-training /tmp/training < /tmp/r2_keys.txt

      - name: Retrain
        if: steps.list.outputs.count != '0'
        run: |
          python web/train_recogniser.py \
            --browser-weight 1000 --svm-c 100 \
            web/browser_train.json /tmp/training/sample_*.json

      - name: Evaluate accuracy
        if: steps.list.outputs.count != '0'
        id: eval
        run: |
          if [ -f web/public/eval_report.json ]; then
            python -m killer_sudoku.training.evaluate \
              --puzzle-dir killer_sudoku/guardian \
              --compare web/public/eval_report.json
          else
            echo "No baseline eval_report.json — skipping comparison (first retrain)."
          fi

      - name: Open failure issue on regression
        if: failure() && steps.eval.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Retrain regression detected $(date -u +%Y-%m-%d)" \
            --body "The scheduled retrain detected an accuracy regression. Check the failed run for details. The model was NOT updated." \
            --label "bug"

      - name: Commit updated model
        if: steps.list.outputs.count != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/num_recogniser.json web/public/num_recogniser.bin
          git diff --cached --quiet && echo "No model changes." || \
            git commit -m "chore: retrain digit recogniser with new browser samples"

      - name: Merge samples into browser_train.json
        if: steps.list.outputs.count != '0'
        run: |
          python3 - <<'EOF'
          import json, glob, pathlib
          base_path = pathlib.Path('web/browser_train.json')
          base = json.loads(base_path.read_text()) if base_path.exists() else {'version': 1, 'samples': []}
          for f in sorted(glob.glob('/tmp/training/sample_*.json')):
              incoming = json.loads(pathlib.Path(f).read_text())
              base['samples'].extend(incoming.get('samples', []))
          base['sampleCount'] = len(base['samples'])
          base_path.write_text(json.dumps(base, separators=(',', ':')))
          EOF
          git add web/browser_train.json
          git diff --cached --quiet && echo "No sample changes." || \
            git commit -m "chore: merge new browser samples into browser_train.json"

      - name: Push commits
        if: steps.list.outputs.count != '0'
        run: git push

      - name: Delete processed R2 objects
        if: steps.list.outputs.count != '0'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python3 scripts/_r2_delete.py cagedoku-training < /tmp/r2_keys.txt

      - name: React to processed GitHub Issue comments
        if: steps.list.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/gbarrett28/cagedoku/issues/1/comments --jq '.[].id' | \
          while IFS= read -r comment_id; do
            body=$(gh api "repos/gbarrett28/cagedoku/issues/comments/$comment_id" --jq '.body // ""')
            if echo "$body" | grep -q 'training/'; then
              echo "Reacting to comment $comment_id"
              gh api "repos/gbarrett28/cagedoku/issues/comments/$comment_id/reactions" \
                -f content='+1' > /dev/null
            fi
          done
