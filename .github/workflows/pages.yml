name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel an in-progress run if a new one
# is queued so the latest commit always wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      # Download opencv.js if it is not committed (it is ~10 MB, so it is
      # excluded from git via .gitignore).  The script retries on transient
      # network failures.
      - name: Download opencv.js
        working-directory: web
        run: |
          if [ ! -f public/opencv.js ]; then
            bash scripts/download-opencv.sh
          else
            echo "opencv.js already present, skipping download."
          fi

      - name: Run tests
        working-directory: web
        run: npm test

      - name: Build
        working-directory: web
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
